# Augment Sidecar for lenskit repository
# Version: 1.0
# Purpose: Provide additional context and recommendations for AI agents

augment:
  version: 1

  # Hotspots: Areas requiring special attention
  hotspots:
    - path: merger/lenskit/core/merge.py
      reason: "Large merge pipeline (>6000 LOC) with branching profile logic"
      severity: "medium"

    - path: merger/lenskit/service/app.py
      reason: "Service entrypoint; auth, SSE streaming and security policies"
      severity: "medium"

    - path: merger/lenskit/cli/cmd_atlas.py
      reason: "Atlas CLI dispatch with many subcommands and policies"
      severity: "low"

  # Suggestions: Architectural recommendations
  suggestions:
    - "Continue splitting core/merge.py into focused modules where seams exist"
    - "Keep frontends (Pythonista CLI, WebUI) in parity per AGENTS.md"
    - "Prefer absolute imports in frontends/pythonista (see test_pythonista_import_policy)"

  # Risks: Known issues or concerns
  risks:
    - "Large merges may exhaust memory on Pythonista/iOS"
    - "Citation map coherence requires matching canonical_md/chunk_index pairs"
    - "Split-mode contract: only canonical part carries content_range_ref"

  # Dependencies: Key external dependencies
  dependencies:
    - name: "fastapi"
      required: true
      purpose: "rLens HTTP service"
    - name: "pydantic"
      required: true
      purpose: "JobRequest model & validation"
    - name: "pytest-asyncio"
      required: true
      purpose: "SSE lifecycle and async service tests"

  # Priorities: Focus areas for development
  priorities:
    - priority: 1
      task: "Maintain frontend parity (parity_guard.py)"
      status: "ongoing"
    - priority: 2
      task: "rLens CLI client maturation (see docs/blueprints/rlens-cli-client-blueprint.md)"
      status: "in-progress"
    - priority: 3
      task: "Improve test coverage for core/merge.py split-mode contracts"
      status: "pending"

  # Context: Additional information for AI understanding
  context:
    coding_style: "Python 3.11+, type hints, dataclasses"
    architecture: "Pipeline: scan → chunk → emit (markdown + JSON sidecars); service wraps as jobs"
    testing: "pytest under merger/lenskit/tests/ and tests/"
    deployment: "CLI + FastAPI service; Pythonista iOS frontend (flat layout)"
