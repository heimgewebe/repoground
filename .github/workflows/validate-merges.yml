name: validate-merges

on:
  push:
    paths:
      - "merges/**.md"
      - "merger/lenskit/**"
      - ".github/workflows/validate-merges.yml"
      - "requirements/repobrief-runtime.lock.txt"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate-merge-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-runtime.lock.txt

      - name: Validate merge meta blocks
        working-directory: merger/lenskit
        run: |
          set -e
          # Alle Merge-Dateien finden, z. B. tools_*_merge.md oder allgemein *.md
          files=$(ls ../../merges/*.md 2>/dev/null || true)

          if [ -z "$files" ]; then
            echo "Keine Merge-Dateien unter merges/ gefunden – nichts zu validieren."
            exit 0
          fi

          echo "Validiere folgende Merge-Dateien:"
          echo "$files"

          python validate_merge_meta.py $files
