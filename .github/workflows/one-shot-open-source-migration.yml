          )
          replace_once(
              "scripts/release/build_release_candidate.py",
              '        "distribution_status": "blocked_without_separate_written_permission",',
              '        "distribution_status": DISTRIBUTION_STATUS,',
          )

          replace_once(
              "scripts/release/verify_release_candidate.py",
              """    CONTRACT_VERSION,
              DOES_NOT_ESTABLISH,""",
              """    CONTRACT_VERSION,
              DISTRIBUTION_STATUS,
              DOES_NOT_ESTABLISH,""",
          )
          replace_once(
