          - Added a permissive defensive name policy, voluntary-funding principles,
            public name-stewardship record, and free quarterly name-watch process.
          - Kept binary, container, model, and bundled third-party publication outside
            the source-only clearance until each exact artifact is reviewed.

          ### Added""",
          )

          replace_once(
              "docs/release/release-policy.md",
              """A release candidate is a deterministic source archive used to verify that one
          Git commit can be packaged, hashed and reconstructed consistently. It is not a
          public release and does not grant distribution permission.""",
              """A release candidate is a deterministic source archive used to verify that one
          Git commit can be packaged, hashed and reconstructed consistently. RepoGround
          source candidates are distributable under Apache-2.0, but candidate creation
          alone does not designate an archive as an official project release.""",
          )
          replace_once(
              "docs/release/release-policy.md",
              "It does not upload or publish the source archive.",
              """It does not upload or publish the source archive automatically. This is an
          operational CI boundary, not a restriction on distribution rights granted by
          Apache-2.0.""",
          )

          # Release builder and verifier: bind generated manifests to the new decision.
          replace_once(
              "scripts/release/build_release_candidate.py",
              'LICENSE_EXPRESSION = "LicenseRef-RepoGround-All-Rights-Reserved"',
              'LICENSE_EXPRESSION = "Apache-2.0"\nDISTRIBUTION_STATUS = "permitted_under_project_license"',
          )
          replace_once(
              "scripts/release/build_release_candidate.py",
              '    "public_distribution_permission",\n    "open_source_status",',
              '    "official_release_status",',
          )
          replace_once(
              "scripts/release/build_release_candidate.py",
              """    license_text = read_blob(repo_path, commit, "LICENSE").decode("utf-8")
              if LICENSE_EXPRESSION not in license_text:
                  raise ValueError("LICENSE does not declare the required LicenseRef")""",
              """    license_text = read_blob(repo_path, commit, "LICENSE").decode("utf-8")
              if "Apache License" not in license_text or "Version 2.0" not in license_text:
                  raise ValueError("LICENSE does not contain the Apache-2.0 license text")""",
          )
          replace_once(
              "scripts/release/build_release_candidate.py",
              '            "distribution_status": "blocked_without_separate_written_permission",',
