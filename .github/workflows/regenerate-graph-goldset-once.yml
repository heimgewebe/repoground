name: Regenerate Graph Goldset Once

"on":
  push:
    branches: [feat/graph-goldset-v2]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/graph-goldset-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt
      - name: Regenerate baseline
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from merger.lenskit.architecture.graph_quality_eval import (
              evaluate_graph_quality_fixture,
              load_graph_quality_goldset,
          )

          root = Path.cwd()
          goldset_path = root / "docs/retrieval/graph_quality_goldset.v1.json"
          goldset = load_graph_quality_goldset(goldset_path)
          fixture_root = root / goldset["fixture_root"]
          report = evaluate_graph_quality_fixture(fixture_root, goldset)
          output = root / "docs/diagnostics/graph-quality-baseline.v1.json"
          output.write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Verify focused surface
        run: |
          python -m pytest -q \
            merger/lenskit/tests/test_graph_quality_goldset.py \
            merger/lenskit/tests/test_architecture_import_graph.py
          ruff check \
            merger/lenskit/architecture/graph_quality_eval.py \
            merger/lenskit/tests/test_graph_quality_goldset.py
          git diff --check
      - name: Commit derived baseline
        run: |
          rm .github/workflows/regenerate-graph-goldset-once.yml
          git config user.name lenskit-graph-goldset
          git config user.email lenskit-graph-goldset@users.noreply.github.com
          git add docs/diagnostics/graph-quality-baseline.v1.json .github/workflows
          git commit -m "docs(graph): regenerate packaging edge-case baseline"
          git push origin HEAD:feat/graph-goldset-v2
