---
name: Graph Source Roots Contract

"on":
  push:
    branches: ["main", "master"]
    paths:
      - "merger/repoground/contracts/architecture.source_roots.v1.schema.json"
      - "merger/repoground/contracts/examples/source_roots_minimal.json"
      - "merger/repoground/tests/test_architecture_source_roots_schema.py"
      - "docs/architecture/graph-source-roots.md"
      - "docs/proofs/graph-source-roots-contract-proof.md"
      - ".github/workflows/graph-source-roots.yml"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "merger/repoground/contracts/architecture.source_roots.v1.schema.json"
      - "merger/repoground/contracts/examples/source_roots_minimal.json"
      - "merger/repoground/tests/test_architecture_source_roots_schema.py"
      - "docs/architecture/graph-source-roots.md"
      - "docs/proofs/graph-source-roots-contract-proof.md"
      - ".github/workflows/graph-source-roots.yml"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  source-roots-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt
      - name: Validate JSON
        run: |
          python3 -m json.tool merger/repoground/contracts/architecture.source_roots.v1.schema.json >/dev/null
          python3 -m json.tool merger/repoground/contracts/examples/source_roots_minimal.json >/dev/null
      - name: Run contract tests
        run: python -m pytest -q merger/repoground/tests/test_architecture_source_roots_schema.py
      - name: Ruff
        run: ruff check merger/repoground/tests/test_architecture_source_roots_schema.py
      - name: Structural checks
        run: git diff --check
