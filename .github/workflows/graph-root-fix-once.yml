name: Graph Root Fix Once

on:
  push:
    branches: [fix/graph-provenance-coherence]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/graph-provenance-coherence
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/fix_graph_index_root_once.py
      - run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt
      - run: |
          python -m pytest -q \
            merger/lenskit/tests/test_graph_rerank.py \
            merger/lenskit/tests/test_retrieval_query.py
          ruff check merger/lenskit/retrieval/query_core.py
          git diff --check
      - run: |
          git config user.name "lenskit-g2-finalizer"
          git config user.email "lenskit-g2-finalizer@users.noreply.github.com"
          git add merger/lenskit/retrieval/query_core.py
          git commit -m "fix(graph): avoid resolving caller index path"
          git push origin HEAD:fix/graph-provenance-coherence
