name: Apply Graph Governance Once

"on":
  push:
    branches: [feat/graph-source-roots-consumer]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/graph-source-roots-consumer
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Materialize generator
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const blob = await github.rest.git.getBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              file_sha: '6173e7c6ebd4c1834fb4c0f67ff4d285cbfbbd9a',
            });
            fs.writeFileSync(
              'scripts/register_graph_source_roots_consumer.py',
              Buffer.from(blob.data.content.replace(/\n/g, ''), 'base64'),
            );
      - name: Generate governance updates
        run: |
          python3 scripts/register_graph_source_roots_consumer.py
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
      - name: Commit generated files and remove helper
        run: |
          rm scripts/register_graph_source_roots_consumer.py
          rm .github/workflows/apply-graph-governance-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(graph): register source root consumer"
          git push origin HEAD:feat/graph-source-roots-consumer
