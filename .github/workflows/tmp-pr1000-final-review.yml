name: temporary PR 1000 final review export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Export product diff and binding
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git diff --binary origin/main...HEAD -- . \
            ':(exclude).github/workflows/tmp-pr1000-final-review.yml' \
            > lenskit-pr1000-final.diff
          sha256sum lenskit-pr1000-final.diff > lenskit-pr1000-final.diff.sha256
          wc -c lenskit-pr1000-final.diff > lenskit-pr1000-final.diff.bytes
          git rev-parse HEAD > export-head.txt
      - name: Upload final review package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: lenskit-pr1000-final-review-${{ github.run_id }}
          path: |
            lenskit-pr1000-final.diff
            lenskit-pr1000-final.diff.sha256
            lenskit-pr1000-final.diff.bytes
            export-head.txt
          if-no-files-found: error
          retention-days: 30
