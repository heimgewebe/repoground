name: one-shot-update-from-main

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: repoground-pr-1043-update-from-main
  cancel-in-progress: false

jobs:
  update:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/repoground-open-source-name-stewardship-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Merge current main without rewriting feature history
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          printf 'main=%s\nhead=%s\n' "$(git rev-parse origin/main)" "$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor origin/main HEAD; then
            git merge --no-ff --no-edit origin/main
          fi
          rm .github/workflows/one-shot-update-from-main.yml
          git add -A
          git commit -m "chore: remove one-shot main update workflow"
          git merge-base --is-ancestor origin/main HEAD
          git diff --check origin/main...HEAD
          git push origin "HEAD:${BRANCH_NAME}"
