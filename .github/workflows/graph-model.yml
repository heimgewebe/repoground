---
name: Graph Model

"on":
  push:
    branches: ["main", "master"]
    paths:
      - "merger/repoground/architecture/graph_index.py"
      - "merger/repoground/architecture/graph_source_validation.py"
      - "merger/repoground/cli/cmd_architecture.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/retrieval/query_core.py"
      - "merger/repoground/contracts/architecture.graph.v1.schema.json"
      - "merger/repoground/contracts/architecture.graph_index.v1.schema.json"
      - "merger/repoground/contracts/entrypoints.v1.schema.json"
      - "merger/repoground/tests/test_graph_index.py"
      - "merger/repoground/tests/test_graph_bundle_integration.py"
      - "merger/repoground/tests/test_graph_bundle_manifest_provenance.py"
      - "merger/repoground/tests/test_cli_architecture_graph_index.py"
      - "merger/repoground/tests/test_graph_current_state_audit.py"
      - "merger/repoground/tests/test_graph_e2e.py"
      - "merger/repoground/tests/test_graph_rerank.py"
      - "merger/repoground/tests/test_graph_eval.py"
      - "merger/repoground/tests/test_retrieval_query.py"
      - "docs/architecture/graph-runtime-contract.md"
      - "docs/diagnostics/graph-current-state-audit.md"
      - "docs/proofs/graph-provenance-coherent-compilation-proof.md"
      - "docs/tasks/board.md"
      - "docs/tasks/index.json"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - ".github/workflows/graph-model.yml"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "merger/repoground/architecture/graph_index.py"
      - "merger/repoground/architecture/graph_source_validation.py"
      - "merger/repoground/cli/cmd_architecture.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/retrieval/query_core.py"
      - "merger/repoground/contracts/architecture.graph.v1.schema.json"
      - "merger/repoground/contracts/architecture.graph_index.v1.schema.json"
      - "merger/repoground/contracts/entrypoints.v1.schema.json"
      - "merger/repoground/tests/test_graph_index.py"
      - "merger/repoground/tests/test_graph_bundle_integration.py"
      - "merger/repoground/tests/test_graph_bundle_manifest_provenance.py"
      - "merger/repoground/tests/test_cli_architecture_graph_index.py"
      - "merger/repoground/tests/test_graph_current_state_audit.py"
      - "merger/repoground/tests/test_graph_e2e.py"
      - "merger/repoground/tests/test_graph_rerank.py"
      - "merger/repoground/tests/test_graph_eval.py"
      - "merger/repoground/tests/test_retrieval_query.py"
      - "docs/architecture/graph-runtime-contract.md"
      - "docs/diagnostics/graph-current-state-audit.md"
      - "docs/proofs/graph-provenance-coherent-compilation-proof.md"
      - "docs/tasks/board.md"
      - "docs/tasks/index.json"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - ".github/workflows/graph-model.yml"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  graph-model:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Require jsonschema
        run: |
          python - <<'PY'
          from importlib.metadata import version
          import jsonschema

          print("jsonschema", version("jsonschema"))
          PY

      - name: Validate graph schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          paths = (
              Path("merger/repoground/contracts/architecture.graph.v1.schema.json"),
              Path("merger/repoground/contracts/architecture.graph_index.v1.schema.json"),
              Path("merger/repoground/contracts/entrypoints.v1.schema.json"),
          )
          for path in paths:
              with path.open(encoding="utf-8") as handle:
                  schema = json.load(handle)
              Draft7Validator.check_schema(schema)
              print(f"{path.name}: meta-valid")
          PY

      - name: Run graph model tests
        run: |
          set -o pipefail
          python -m pytest -q \
            merger/repoground/tests/test_graph_index.py \
            merger/repoground/tests/test_graph_bundle_integration.py \
            merger/repoground/tests/test_graph_bundle_manifest_provenance.py \
            merger/repoground/tests/test_cli_architecture_graph_index.py \
            merger/repoground/tests/test_graph_current_state_audit.py \
            merger/repoground/tests/test_graph_e2e.py \
            merger/repoground/tests/test_graph_rerank.py \
            merger/repoground/tests/test_graph_eval.py \
            merger/repoground/tests/test_retrieval_query.py \
            2>&1 | tee graph-model-tests.log

      - name: Upload failing test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: graph-model-test-diagnostics
          path: graph-model-tests.log
          if-no-files-found: warn
          retention-days: 1

      - name: Ruff
        run: |
          ruff check \
            merger/repoground/architecture/graph_index.py \
            merger/repoground/architecture/graph_source_validation.py \
            merger/repoground/cli/cmd_architecture.py \
            merger/repoground/retrieval/query_core.py \
            merger/repoground/tests/test_graph_index.py \
            merger/repoground/tests/test_graph_bundle_integration.py \
            merger/repoground/tests/test_graph_bundle_manifest_provenance.py \
            merger/repoground/tests/test_cli_architecture_graph_index.py \
            merger/repoground/tests/test_graph_current_state_audit.py \
            merger/repoground/tests/test_graph_e2e.py \
            merger/repoground/tests/test_graph_rerank.py \
            merger/repoground/tests/test_retrieval_query.py
