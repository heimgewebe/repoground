name: one-shot-pr-diff-export

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/repoground-open-source-name-stewardship-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Export exact final-scope diff
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git diff --binary origin/main...HEAD -- \
            . ':(exclude).github/workflows/one-shot-pr-diff-export.yml' \
            > repoground-pr-1043.diff
          test -s repoground-pr-1043.diff
          sha256sum repoground-pr-1043.diff > repoground-pr-1043.diff.sha256
          git diff --check origin/main...HEAD -- \
            . ':(exclude).github/workflows/one-shot-pr-diff-export.yml'
      - name: Upload review artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: repoground-pr-1043-diff-${{ github.run_id }}
          path: |
            repoground-pr-1043.diff
            repoground-pr-1043.diff.sha256
          if-no-files-found: error
          retention-days: 14
