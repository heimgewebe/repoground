name: "contracts-validate"

permissions:
  contents: read

concurrency:
  # Keep PR-specific groups to prevent cross-branch cancellations.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push: {}
  pull_request: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  FAIL_ON_NO_BASE: "1"
  ALLOW_REMOVALS: "0"

jobs:
  version-sync-check:
    name: "Security: enforce static pin for contracts reusable workflow"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify 'uses:' pins for heimgewebe/contracts-mirror
        env:
          REQUIRED_REPO: "heimgewebe/contracts-mirror/.github/workflows/contracts-ajv-reusable.yml"
          REQUIRED_REF: "0e5430c72b7948124e2b892da9473bdf8f8a120e"
        run: |
          set -euo pipefail
          shopt -s extglob

          WF_FILE=".github/workflows/contracts-validate.yml"
          [[ -f "$WF_FILE" ]] || { echo "::error::Workflow file not found"; exit 1; }

          uses_count=0
          contracts_ref_count=0
          mismatches=0

          while IFS= read -r line || [[ -n "$line" ]]; do
            clean_line="${line%%#*}"
            trimmed="${clean_line#"${clean_line%%[![:space:]]*}"}"

            if [[ "$trimmed" == uses:* ]]; then
              val="${trimmed#uses:}"
              val="${val#"${val%%[![:space:]]*}"}"
              val="${val%\"}"
              val="${val#\"}"
              val="${val%\'}"
              val="${val#\'}"

              if [[ "$val" == *"heimgewebe/contracts"* ]]; then
                uses_count=$((uses_count + 1))

                if [[ "$val" != *"@"* ]]; then
                  echo "::error file=$WF_FILE::uses reference missing @ symbol"
                  mismatches=1
                  continue
                fi

                repo="${val%@*}"
                ref="${val#*@}"

                if [[ "$repo" != "$REQUIRED_REPO" ]]; then
                  echo "::error file=$WF_FILE::Expected repository $REQUIRED_REPO but got $repo"
                  mismatches=1
                fi

                if [[ ! "$ref" =~ ^[0-9a-f]{40}$ ]]; then
                  echo "::error file=$WF_FILE::uses ref must be a 40-character lowercase hex SHA, got $ref"
                  mismatches=1
                fi

                if [[ "$ref" != "$REQUIRED_REF" ]]; then
                  echo "::error file=$WF_FILE::uses ref mismatch. Expected $REQUIRED_REF, got $ref"
                  mismatches=1
                fi
              fi
            fi

            if [[ "$trimmed" == contracts_ref:* ]]; then
              contracts_ref_count=$((contracts_ref_count + 1))
              val="${trimmed#contracts_ref:}"
              val="${val#"${val%%[![:space:]]*}"}"
              val="${val%\"}"
              val="${val#\"}"
              val="${val%\'}"
              val="${val#\'}"

              if [[ ! "$val" =~ ^[0-9a-f]{40}$ ]]; then
                echo "::error file=$WF_FILE::contracts_ref must be a 40-character lowercase hex SHA, got $val"
                mismatches=1
              fi

              if [[ "$val" != "$REQUIRED_REF" ]]; then
                echo "::error file=$WF_FILE::contracts_ref mismatch. Expected $REQUIRED_REF, got $val"
                mismatches=1
              fi
            fi
          done < "$WF_FILE"

          if [[ $uses_count -ne 1 ]]; then
            echo "::error file=$WF_FILE::Expected exactly 1 uses caller for mirror, found $uses_count"
            mismatches=1
          fi

          if [[ $contracts_ref_count -ne 1 ]]; then
            echo "::error file=$WF_FILE::Expected exactly 1 contracts_ref input, found $contracts_ref_count"
            mismatches=1
          fi

          if [[ $mismatches -ne 0 ]]; then
            exit 1
          fi

          [[ $mismatches -eq 0 ]] || exit 1
          echo "::notice::✅ All version pins validated"

  guard:
    name: "Security: guard deletion policy (contracts)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GH_DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
      GH_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      GH_PUSH_BEFORE: ${{ github.event.before }}
      PROTECTED_REGEX: '^(merger/lenskit/contracts/|docs/contracts/)'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce guard policy
        run: |
          set -euo pipefail
          is_truthy() { case "${1:-0}" in 1|true|yes|on) return 0 ;; esac; return 1; }

          if is_truthy "${ALLOW_REMOVALS:-0}"; then
            echo "::notice::ALLOW_REMOVALS=1 → skipping guard"
            exit 0
          fi

          base=""
          base_src=""

          if [[ -n "${GH_PR_BASE_SHA:-}" ]] && git rev-parse --verify "${GH_PR_BASE_SHA}^{commit}" &>/dev/null; then
            if mb="$(git merge-base "$GH_PR_BASE_SHA" HEAD 2>/dev/null)"; then
              base="$mb"; base_src="merge-base(pr_base,HEAD)"
            fi
          fi

          if [[ -z "$base" && -n "${GH_PUSH_BEFORE:-}" && ! "${GH_PUSH_BEFORE}" =~ ^0{40}$ ]] \
             && git rev-parse --verify "${GH_PUSH_BEFORE}^{commit}" &>/dev/null; then
            base="$GH_PUSH_BEFORE"; base_src="push_before"
          fi

          if [[ -z "$base" ]]; then
            git fetch -q origin "${GH_DEFAULT_BRANCH}" || true
            if git rev-parse "origin/${GH_DEFAULT_BRANCH}^{commit}" &>/dev/null; then
              if mb="$(git merge-base "origin/${GH_DEFAULT_BRANCH}" HEAD 2>/dev/null)"; then
                base="$mb"; base_src="merge-base(origin/${GH_DEFAULT_BRANCH},HEAD)"
              fi
            fi
          fi

          if [[ -z "$base" ]]; then
            if is_truthy "${FAIL_ON_NO_BASE:-1}"; then
              echo "::error::Cannot determine merge-base"; exit 1
            else
              echo "::notice::No merge-base found - skipping guard"; exit 0
            fi
          fi

          echo "::notice::Checking diff from ${base:0:8}...HEAD (source=$base_src)"

          blocked=()
          while IFS=$'\t' read -r -a fields; do
            status="${fields[0]}"
            p1="${fields[1]}"
            p2="${fields[2]:-}"
            [[ "$p1" =~ ${PROTECTED_REGEX} ]] || continue
            case "$status" in
              D)  blocked+=("DELETE: $p1") ;;
              R*) blocked+=("RENAME: $p1 → ${p2:-(unknown destination)}") ;;
            esac
          done < <(git diff --name-status --diff-filter=DR "${base}...HEAD")

          if (( ${#blocked[@]} )); then
            echo "::group::❌ Protected file deletions blocked"
            printf '  • %s\n' "${blocked[@]}" | sort -u
            echo "::endgroup::"
            echo "::error::Guard violation"
            exit 1
          fi

          echo "::notice::✅ Guard passed"

  validate:
    name: "Validate fixtures via reusable workflow"
    needs: [version-sync-check, guard]
    uses: heimgewebe/contracts-mirror/.github/workflows/contracts-ajv-reusable.yml@0e5430c72b7948124e2b892da9473bdf8f8a120e
    secrets: inherit
    with:
      fixtures_glob: ${{ vars.FIXTURES_GLOB || 'merger/lenskit/contracts/examples/**/*.json merger/lenskit/contracts/examples/**/*.jsonl' }}
      contracts_ref: 0e5430c72b7948124e2b892da9473bdf8f8a120e
