name: Forensic Preflight Canary

# Controlled, path-scoped canary for the diagnostic `governance forensic-preflight`
# readiness check. It promotes the existing F2c calibration into CI *visibility*:
# it builds a small hermetic fixture bundle, runs the preflight CLI and asserts a
# strict PASS, persisting a machine-readable JSON report as a build artifact.
#
# This is a CANARY, not a global gate. A PASS means the formal forensic_strict
# prerequisites are present; it is NOT a claim-truth verdict and does NOT make
# forensic_strict a required check for all PRs. Full blocking promotion remains a
# follow-up after several stable canary runs (see
# docs/proofs/forensic-preflight-ci-canary-proof.md). The canary changes no core
# bundle-emission, claim-map or surface logic.

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - ".github/workflows/forensic-preflight-canary.yml"
      - "scripts/proofs/forensic_preflight_ci_canary.sh"
      - "scripts/proofs/forensic_preflight_calibration.sh"
      - "merger/repoground/core/forensic_preflight.py"
      - "merger/repoground/core/post_emit_health.py"
      - "merger/repoground/core/bundle_surface_validate.py"
      - "merger/repoground/core/claim_evidence_map.py"
      - "merger/repoground/core/doc_freshness.py"
      - "merger/repoground/core/agent_reading_pack.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/cli/cmd_governance.py"
      - "merger/repoground/cli/main.py"
      - "merger/repoground/contracts/**"
      - "merger/repoground/tests/test_forensic_preflight.py"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - "docs/proofs/forensic-preflight-ci-canary-proof.md"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - ".github/workflows/forensic-preflight-canary.yml"
      - "scripts/proofs/forensic_preflight_ci_canary.sh"
      - "scripts/proofs/forensic_preflight_calibration.sh"
      - "merger/repoground/core/forensic_preflight.py"
      - "merger/repoground/core/post_emit_health.py"
      - "merger/repoground/core/bundle_surface_validate.py"
      - "merger/repoground/core/claim_evidence_map.py"
      - "merger/repoground/core/doc_freshness.py"
      - "merger/repoground/core/agent_reading_pack.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/cli/cmd_governance.py"
      - "merger/repoground/cli/main.py"
      - "merger/repoground/contracts/**"
      - "merger/repoground/tests/test_forensic_preflight.py"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - "docs/proofs/forensic-preflight-ci-canary-proof.md"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  forensic-preflight-canary:
    name: forensic preflight canary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          # The RepoGround dependency locks are generated and supported on
          # Python 3.12; every lock consumer must use the same interpreter line.
          python-version: '3.12'

      - name: Log Python Version
        run: python --version

      - name: Install Dependencies
        # the RepoGround development lock provides jsonschema, which the preflight
        # needs to validate the claim-evidence-map schema. Without it the positive
        # case would block on claim_evidence_map_schema_valid rather than pass.
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Shell syntax checks
        run: |
          bash -n scripts/proofs/forensic_preflight_ci_canary.sh
          bash -n scripts/proofs/forensic_preflight_calibration.sh

      - name: Unit coverage for forensic preflight (blocking)
        run: pytest -q merger/repoground/tests/test_forensic_preflight.py

      - name: Run forensic preflight canary (blocking)
        # Builds a hermetic fixture bundle, runs `governance forensic-preflight
        # --json` and asserts status=pass. Fails only on a real canary violation.
        run: bash scripts/proofs/forensic_preflight_ci_canary.sh

      - name: Upload forensic preflight canary artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: forensic-preflight-canary
          path: .tmp/forensic-preflight-ci-canary/artifacts/
          if-no-files-found: warn
