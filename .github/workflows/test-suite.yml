name: test-suite

# Full-suite gate. All other test workflows are path-scoped subsets; without
# this workflow, cross-cutting drift (a feature changing artifact emission and
# breaking an unrelated test file) is invisible until someone runs the whole
# suite locally. See docs/proofs/repo-complete-audit-2026-07-proof.md.
#
# Deselected from pytest-full:
# - browser: executed separately by the required browser-tests job
# - doc_freshness_live: declared non-blocking by design; run with
#   continue-on-error in doc-freshness.yml

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest-full:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-dev.lock.txt

      - name: Run full pytest suite
        run: pytest -q -m "not browser and not doc_freshness_live"


  release-candidate:
    name: release-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Check release contracts
        run: python scripts/release/check_release_contract.py

      - name: Build and compare deterministic source candidates
        run: |
          rm -rf /tmp/repobrief-release-a /tmp/repobrief-release-b
          python scripts/release/build_release_candidate.py --repo . --ref HEAD --out /tmp/repobrief-release-a
          python scripts/release/build_release_candidate.py --repo . --ref HEAD --out /tmp/repobrief-release-b
          diff --recursive --brief /tmp/repobrief-release-a /tmp/repobrief-release-b
          python scripts/release/verify_release_candidate.py --candidate-dir /tmp/repobrief-release-a --repo .
          python scripts/release/verify_release_candidate.py --candidate-dir /tmp/repobrief-release-b --repo .

  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright/python:v1.61.0-noble@sha256:a9731514f24121d1dcd25d58d0a38146646d290a5998fd80d3e533e7b5e21c69
      options: --ipc=host
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install pinned browser-test dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-browser.lock.txt

      - name: Verify pinned Chromium runtime
        run: python scripts/ci/check_browser_gate_environment.py

      - name: Run Playwright browser tests
        run: |
          python -m pytest -q -m browser merger/lenskit/tests/test_webui_payload.py \
            --browser chromium \
            --output=test-results \
            --tracing retain-on-failure \
            --screenshot only-on-failure \
            --video retain-on-failure

      - name: Upload browser diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: browser-test-results-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  webui-js-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"

      - name: Run WebUI JS tests
        run: |
          set -euo pipefail
          for f in merger/lenskit/frontends/webui/tests/test_*.js; do
            echo "=== node $f"
            node "$f"
          done
