name: Graph Path Finalize Once

on:
  push:
    branches: [fix/graph-provenance-coherence]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/graph-provenance-coherence
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply final path-boundary patch
        run: python3 scripts/finalize_graph_path_boundary_once.py
      - name: Install dependencies
        run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run focused tests
        run: |
          set -o pipefail
          python -m pytest -q \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py \
            merger/lenskit/tests/test_cli_architecture_graph_index.py \
            merger/lenskit/tests/test_graph_current_state_audit.py \
            merger/lenskit/tests/test_graph_e2e.py \
            merger/lenskit/tests/test_graph_rerank.py \
            merger/lenskit/tests/test_graph_eval.py \
            merger/lenskit/tests/test_retrieval_query.py \
            2>&1 | tee graph-path-tests.log
      - name: Upload failing test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: graph-path-test-diagnostics
          path: graph-path-tests.log
          retention-days: 1
      - name: Ruff
        run: |
          ruff check \
            merger/lenskit/architecture/graph_index.py \
            merger/lenskit/architecture/graph_source_validation.py \
            merger/lenskit/cli/cmd_architecture.py \
            merger/lenskit/retrieval/query_core.py \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py \
            merger/lenskit/tests/test_cli_architecture_graph_index.py \
            merger/lenskit/tests/test_graph_current_state_audit.py \
            merger/lenskit/tests/test_graph_e2e.py \
            merger/lenskit/tests/test_graph_rerank.py \
            merger/lenskit/tests/test_retrieval_query.py
      - name: Diff check
        run: git diff --check
      - name: Commit verified changes
        run: |
          git config user.name "lenskit-g2-finalizer"
          git config user.email "lenskit-g2-finalizer@users.noreply.github.com"
          git add \
            .github/workflows/graph-model.yml \
            docs/architecture/graph-runtime-contract.md \
            docs/proofs/graph-provenance-coherent-compilation-proof.md \
            merger/lenskit/tests/test_graph_rerank.py
          git commit -m "fix(graph): finalize retrieval path boundary"
          git push origin HEAD:fix/graph-provenance-coherence
