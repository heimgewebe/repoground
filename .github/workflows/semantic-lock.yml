name: semantic-lock

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/semantic-lock.yml"
      - "requirements/repoground-semantic-linux-x86_64-py312.in"
      - "requirements/repoground-semantic-linux-x86_64-py312.constraints.txt"
      - "requirements/repoground-semantic-linux-x86_64-py312.lock.txt"
      - "merger/repoground/requirements-semantic.txt"
      - "merger/repoground/contracts/repoground-semantic-platforms.v1.schema.json"
      - "merger/repoground/contracts/repoground-release-candidate.v1.schema.json"
      - "merger/repoground/tests/test_semantic_extension_lock.py"
      - "merger/repoground/tests/test_release_packaging.py"
      - "merger/repoground/retrieval/query_core.py"
      - "docs/release/repoground-semantic-platforms.v1.json"
      - "scripts/release/compile_semantic_lock.py"
      - "scripts/ci/run_semantic_real_model_integration.py"
      - "scripts/ci/run_semantic_real_model_integration.sh"
      - "merger/repoground/tests/test_semantic_real_model.py"
      - "scripts/release/compile_semantic_lock.sh"
      - "scripts/release/build_release_candidate.py"
      - "scripts/release/verify_release_candidate.py"
      - "scripts/release/check_release_contract.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/semantic-lock.yml"
      - "requirements/repoground-semantic-linux-x86_64-py312.in"
      - "requirements/repoground-semantic-linux-x86_64-py312.constraints.txt"
      - "requirements/repoground-semantic-linux-x86_64-py312.lock.txt"
      - "merger/repoground/requirements-semantic.txt"
      - "merger/repoground/contracts/repoground-semantic-platforms.v1.schema.json"
      - "merger/repoground/contracts/repoground-release-candidate.v1.schema.json"
      - "merger/repoground/tests/test_semantic_extension_lock.py"
      - "merger/repoground/tests/test_release_packaging.py"
      - "merger/repoground/retrieval/query_core.py"
      - "docs/release/repoground-semantic-platforms.v1.json"
      - "scripts/release/compile_semantic_lock.py"
      - "scripts/ci/run_semantic_real_model_integration.py"
      - "scripts/ci/run_semantic_real_model_integration.sh"
      - "merger/repoground/tests/test_semantic_real_model.py"
      - "scripts/release/compile_semantic_lock.sh"
      - "scripts/release/build_release_candidate.py"
      - "scripts/release/verify_release_candidate.py"
      - "scripts/release/check_release_contract.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Reproduce semantic constraints and lock
        run: scripts/release/compile_semantic_lock.sh --check

      - name: Verify hash-locked install and offline real-model integration
        run: |
          set -euo pipefail
          umask 077
          target=""
          cleanup() {
            if [[ -n "$target" ]]; then
              chmod -R u+rwX -- "$target" 2>/dev/null || true
              rm -rf -- "$target"
            fi
          }
          trap cleanup EXIT
          target="$(
            mktemp -d \
              ".semantic-real-model-target.XXXXXX"
          )"
          scripts/release/compile_semantic_lock.sh \
            --verify-install "$target"
          chmod -R a+rX -- "$target"
          scripts/ci/run_semantic_real_model_integration.sh "$target"
