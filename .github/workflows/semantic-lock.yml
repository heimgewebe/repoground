name: semantic-lock

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/semantic-lock.yml"
      - "requirements/repoground-semantic-linux-x86_64-py312.in"
      - "requirements/repoground-semantic-linux-x86_64-py312.constraints.txt"
      - "requirements/repoground-semantic-linux-x86_64-py312.lock.txt"
      - "merger/repoground/requirements-semantic.txt"
      - "merger/repoground/contracts/repoground-semantic-platforms.v1.schema.json"
      - "merger/repoground/contracts/repoground-release-candidate.v1.schema.json"
      - "merger/repoground/tests/test_semantic_extension_lock.py"
      - "merger/repoground/tests/test_release_packaging.py"
      - "docs/release/semantic-extension-platforms.v1.json"
      - "scripts/release/compile_semantic_lock.py"
      - "scripts/release/compile_semantic_lock.sh"
      - "scripts/release/build_release_candidate.py"
      - "scripts/release/verify_release_candidate.py"
      - "scripts/release/check_release_contract.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/semantic-lock.yml"
      - "requirements/repoground-semantic-linux-x86_64-py312.in"
      - "requirements/repoground-semantic-linux-x86_64-py312.constraints.txt"
      - "requirements/repoground-semantic-linux-x86_64-py312.lock.txt"
      - "merger/repoground/requirements-semantic.txt"
      - "merger/repoground/contracts/repoground-semantic-platforms.v1.schema.json"
      - "merger/repoground/contracts/repoground-release-candidate.v1.schema.json"
      - "merger/repoground/tests/test_semantic_extension_lock.py"
      - "merger/repoground/tests/test_release_packaging.py"
      - "docs/release/semantic-extension-platforms.v1.json"
      - "scripts/release/compile_semantic_lock.py"
      - "scripts/release/compile_semantic_lock.sh"
      - "scripts/release/build_release_candidate.py"
      - "scripts/release/verify_release_candidate.py"
      - "scripts/release/check_release_contract.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Reproduce semantic constraints and lock
        run: scripts/release/compile_semantic_lock.sh --check

      - name: Verify hash-locked isolated installation
        run: |
          target="$(mktemp -d)"
          scripts/release/compile_semantic_lock.sh \
            --verify-install "$target"
