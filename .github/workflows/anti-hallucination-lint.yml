name: Anti-Hallucination Contract Lint (C2.4)

# Path-scoped blocking gate for the Governance Track C contract-static lint
# (merger/repoground/core/anti_hallucination_lint.py + the `lenskit governance lint`
# CLI). Enforces L3 (inference-boundary presence for self-declared
# diagnostic_signal/runtime_observation contracts) and L5 (no truth-language
# property names or verdict values). Runs only when contracts, the lint module,
# its CLI, or its tests change. This is distinct from the Parity Gate
# (parity-gate.yml) and the ruff lint (lint.yml).

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "merger/repoground/core/anti_hallucination_lint.py"
      - "merger/repoground/cli/cmd_governance.py"
      - "merger/repoground/cli/main.py"
      - "merger/repoground/contracts/**"
      - "merger/repoground/tests/test_anti_hallucination_lint.py"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/anti-hallucination-lint.yml"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "merger/repoground/core/anti_hallucination_lint.py"
      - "merger/repoground/cli/cmd_governance.py"
      - "merger/repoground/cli/main.py"
      - "merger/repoground/contracts/**"
      - "merger/repoground/tests/test_anti_hallucination_lint.py"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/anti-hallucination-lint.yml"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  anti-hallucination-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Log Python Version
        run: python --version

      - name: Install Dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Run Contract Lint (blocking)
        # Exits non-zero on any L3/L5 error. Tracked deferrals are non-blocking.
        run: python -m merger.repoground.cli.main governance lint

      - name: Run Lint Test Suite
        run: pytest -q merger/repoground/tests/test_anti_hallucination_lint.py
