name: G4a Preview PR

"on":
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/register_g4a_once.py
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
      - uses: actions/upload-artifact@v4
        with:
          name: g4a-task-registration-pr
          path: |
            docs/tasks/board.md
            docs/tasks/index.json
          retention-days: 1
