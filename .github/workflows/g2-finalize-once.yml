name: G2 Finalize Once

on:
  push:
    branches:
      - fix/graph-provenance-coherence
    paths:
      - .github/workflows/g2-finalize-once.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/graph-provenance-coherence
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic G2 finalization
        run: |
          set -o pipefail
          python3 scripts/finalize_graph_g2_once.py 2>&1 | tee g2-finalizer.log

      - name: Upload finalizer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g2-finalizer-diagnostics
          path: g2-finalizer.log
          if-no-files-found: warn
          retention-days: 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt

      - name: Focused graph tests
        run: |
          python -m pytest -q \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py \
            merger/lenskit/tests/test_cli_architecture_graph_index.py \
            merger/lenskit/tests/test_graph_current_state_audit.py \
            merger/lenskit/tests/test_graph_e2e.py \
            merger/lenskit/tests/test_graph_rerank.py \
            merger/lenskit/tests/test_graph_eval.py

      - name: Ruff
        run: |
          ruff check \
            merger/lenskit/architecture/graph_index.py \
            merger/lenskit/architecture/graph_source_validation.py \
            merger/lenskit/cli/cmd_architecture.py \
            merger/lenskit/tests/test_graph_index.py \
            merger/lenskit/tests/test_graph_bundle_integration.py \
            merger/lenskit/tests/test_graph_bundle_manifest_provenance.py \
            merger/lenskit/tests/test_cli_architecture_graph_index.py \
            merger/lenskit/tests/test_graph_current_state_audit.py \
            merger/lenskit/tests/test_graph_e2e.py

      - name: Planning and structural guards
        run: |
          python3 -m json.tool docs/tasks/index.json >/dev/null
          python3 -m scripts.docmeta.check_planning_registration \
            --ratchet \
            --baseline docs/tasks/planning-registration-baseline.json \
            --format human
          git diff --check

      - name: Remove one-time machinery
        run: |
          rm scripts/finalize_graph_g2_once.py
          rm .github/workflows/g2-finalize-once.yml

      - name: Commit verified finalization
        run: |
          set -euo pipefail
          git config user.name "lenskit-g2-finalizer"
          git config user.email "lenskit-g2-finalizer@users.noreply.github.com"
          git add -A
          git commit -m "fix(graph): enforce provenance-coherent compilation"
          git push origin HEAD:fix/graph-provenance-coherence
