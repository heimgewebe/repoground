name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.13"

      # Repo-wide ratchet scope is intentionally isolated in ruff-ci.toml.
      # Bare path-scoped Ruff jobs keep Ruff's default rule selection.
      - name: Check pinned Ruff scope
        run: ruff check --config ruff-ci.toml .
