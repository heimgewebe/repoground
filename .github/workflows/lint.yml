name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.13"

      # Repo-wide ratchet scope is intentionally isolated in ruff-ci.toml.
      # Bare path-scoped Ruff jobs keep Ruff's default rule selection.
      - name: Check pinned Ruff scope
        run: ruff check --config ruff-ci.toml .

  self-review-hash:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute implementation diff hash
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          git diff origin/main...HEAD -- . \
            ':(exclude)docs/proofs/repobrief-agent-memory-citations-v1.self-review.md' \
            ':(exclude).github/workflows/repobrief-self-review-hash.yml' \
            ':(exclude).github/workflows/lint.yml' \
            > /tmp/repobrief-implementation.diff
          echo "IMPLEMENTATION_HEAD=${GITHUB_SHA}"
          echo "IMPLEMENTATION_DIFF_SHA256=$(sha256sum /tmp/repobrief-implementation.diff | awk '{print $1}')"
          echo "IMPLEMENTATION_DIFF_BYTES=$(wc -c < /tmp/repobrief-implementation.diff)"
