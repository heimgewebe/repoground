name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-dev.lock.txt

      # Repo-wide ratchet scope is intentionally isolated in ruff-ci.toml.
      # Bare path-scoped Ruff jobs keep Ruff's default rule selection.
      - name: Check pinned Ruff scope
        run: ruff check --config ruff-ci.toml .
