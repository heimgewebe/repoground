name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      # Repo-wide ratchet scope is intentionally isolated in ruff-ci.toml.
      # Bare path-scoped Ruff jobs keep Ruff's default rule selection.
      - name: Check pinned Ruff scope
        run: ruff check --config ruff-ci.toml .

      - name: Check graph and complexity maintainability ratchets
        run: python scripts/ci/check_graph_maintainability.py --root . --format json
