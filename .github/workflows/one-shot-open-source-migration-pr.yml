name: one-shot-open-source-migration-pr

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: repoground-open-source-migration-pr-v1
  cancel-in-progress: false

jobs:
  migrate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/repoground-open-source-name-stewardship-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Prepare reviewed one-shot migration
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/one-shot-open-source-migration.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          marker = '        run: |'
          try:
              start = lines.index(marker) + 1
          except ValueError as exc:
              raise SystemExit('migration run block not found') from exc

          block = []
          for line in lines[start:]:
              if line and not line.startswith('          '):
                  break
              block.append(line[10:] if line.startswith('          ') else '')
          script = '\n'.join(block).rstrip() + '\n'

          old = 'apache_license = response.read().decode("utf-8")'
          new = 'apache_license = response.read().decode("utf-8").lstrip("\\ufeff\\r\\n ")'
          if script.count(old) != 1:
              raise SystemExit('canonical license normalization target missing')
          script = script.replace(old, new, 1)

          old = '"It does not upload or publish the source archive."'
          new = '"""It does\\nnot upload or publish the source archive."""'
          if script.count(old) != 1:
              raise SystemExit('wrapped release-policy target missing')
          script = script.replace(old, new, 1)

          if "git push origin" not in script or "check_identity_distribution_decisions.py" not in script:
              raise SystemExit('migration script boundary incomplete')
          Path('/tmp/repoground-open-source-migrate.sh').write_text(script, encoding='utf-8')
          PY
          rm .github/workflows/one-shot-open-source-migration-pr.yml

      - name: Execute reviewed one-shot migration
        id: migration
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          set +e
          bash /tmp/repoground-open-source-migrate.sh > /tmp/repoground-open-source-migration.log 2>&1
          status=$?
          set -e
          cat /tmp/repoground-open-source-migration.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload migration diagnostics after failure
        if: steps.migration.outputs.exit_code != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: repoground-open-source-migration-${{ github.run_id }}
          path: /tmp/repoground-open-source-migration.log
          if-no-files-found: error
          retention-days: 7

      - name: Propagate migration failure
        if: steps.migration.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.migration.outputs.exit_code }}
        run: exit "$EXIT_CODE"
