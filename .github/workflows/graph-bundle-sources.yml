---
name: Graph Bundle Sources

"on":
  push:
    branches: ["main", "master"]
    paths:
      - "merger/repoground/architecture/bundle_sources.py"
      - "merger/repoground/architecture/import_graph.py"
      - "merger/repoground/architecture/entrypoints.py"
      - "merger/repoground/core/constants.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/contracts/architecture.graph.v1.schema.json"
      - "merger/repoground/contracts/entrypoints.v1.schema.json"
      - "merger/repoground/contracts/architecture.graph_index.v1.schema.json"
      - "merger/repoground/contracts/bundle-manifest.v1.schema.json"
      - "merger/repoground/tests/test_graph_bundle_sources.py"
      - "merger/repoground/tests/test_graph_bundle_integration.py"
      - "merger/repoground/tests/test_graph_bundle_manifest_provenance.py"
      - "docs/proofs/graph-bundle-source-production-proof.md"
      - "docs/tasks/board.md"
      - "docs/tasks/index.json"
      - ".github/workflows/graph-bundle-sources.yml"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "merger/repoground/architecture/bundle_sources.py"
      - "merger/repoground/architecture/import_graph.py"
      - "merger/repoground/architecture/entrypoints.py"
      - "merger/repoground/core/constants.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/contracts/architecture.graph.v1.schema.json"
      - "merger/repoground/contracts/entrypoints.v1.schema.json"
      - "merger/repoground/contracts/architecture.graph_index.v1.schema.json"
      - "merger/repoground/contracts/bundle-manifest.v1.schema.json"
      - "merger/repoground/tests/test_graph_bundle_sources.py"
      - "merger/repoground/tests/test_graph_bundle_integration.py"
      - "merger/repoground/tests/test_graph_bundle_manifest_provenance.py"
      - "docs/proofs/graph-bundle-source-production-proof.md"
      - "docs/tasks/board.md"
      - "docs/tasks/index.json"
      - ".github/workflows/graph-bundle-sources.yml"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  graph-bundle-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Validate schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          for name in (
              "architecture.graph.v1.schema.json",
              "entrypoints.v1.schema.json",
              "architecture.graph_index.v1.schema.json",
              "bundle-manifest.v1.schema.json",
          ):
              path = Path("merger/repoground/contracts") / name
              with path.open(encoding="utf-8") as handle:
                  Draft7Validator.check_schema(json.load(handle))
              print(f"{name}: meta-valid")
          PY

      - name: Run source-production tests
        run: |
          set -o pipefail
          python -m pytest -q \
            merger/repoground/tests/test_graph_bundle_sources.py \
            merger/repoground/tests/test_graph_bundle_integration.py \
            merger/repoground/tests/test_graph_bundle_manifest_provenance.py \
            2>&1 | tee graph-bundle-sources-tests.log

      - name: Upload failing diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: graph-bundle-sources-diagnostics
          path: graph-bundle-sources-tests.log
          if-no-files-found: warn
          retention-days: 1

      - name: Ruff
        run: |
          ruff check \
            merger/repoground/architecture/bundle_sources.py \
            merger/repoground/core/constants.py \
            merger/repoground/tests/test_graph_bundle_sources.py \
            merger/repoground/tests/test_graph_bundle_integration.py \
            merger/repoground/tests/test_graph_bundle_manifest_provenance.py

      - name: Structural checks
        run: |
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
