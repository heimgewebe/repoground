---
name: PR 799 one-shot repair

"on":
  push:
    branches:
      - docs/guard-relation-validates-schema-v1b-target-proof

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: docs/guard-relation-validates-schema-v1b-target-proof
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply exact source-only replacement
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/proofs/guard_relation_validates_schema_audit.py")
          old = (
              '            "Validators reached only through a project-local loader "\n'
              '            "(_load_jsonschema / importlib.import_module) are manual_source_review, not derived_ast.",'
          )
          new = (
              '            "Validators reached only through a project-local loader '
              '(_load_jsonschema / importlib.import_module) are manual_source_review, not derived_ast.",'
          )
          text = path.read_text(encoding="utf-8")
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"expected exactly one replacement target, found {count}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

          python -m py_compile scripts/proofs/guard_relation_validates_schema_audit.py
          git diff --check

      - name: Commit repair and remove one-shot workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/pr799-one-shot-repair.yml
          git add scripts/proofs/guard_relation_validates_schema_audit.py
          git diff --cached --check
          git commit -m "style(proofs): make limitation string explicit"
          git push origin HEAD:docs/guard-relation-validates-schema-v1b-target-proof
