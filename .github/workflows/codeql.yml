name: CodeQL

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Lenskit CodeQL policy (python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ github.token }}
          fetch-depth: 1
          persist-credentials: true

      - name: Validate CodeQL suppression inventory
        run: python3 scripts/ci/check_codeql_suppressions.py

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          output: ${{ runner.temp }}/codeql-results

      - name: Require clean raw CodeQL SARIF
        run: >-
          python3 scripts/ci/assert_codeql_sarif_clean.py
          "${{ steps.analyze.outputs.sarif-output }}"
