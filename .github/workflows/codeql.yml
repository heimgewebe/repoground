name: CodeQL

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: RepoGround CodeQL policy (python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          token: ${{ github.token }}
          fetch-depth: 1
          persist-credentials: true

      - name: Validate CodeQL suppression inventory
        run: python3 scripts/ci/check_codeql_suppressions.py

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a  # v4

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          output: ${{ runner.temp }}/codeql-results

      - name: Require clean raw CodeQL SARIF
        run: >-
          python3 scripts/ci/assert_codeql_sarif_clean.py
          "${{ steps.analyze.outputs.sarif-output }}"
