name: CodeQL

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1
          persist-credentials: true

      - name: Validate CodeQL suppression inventory
        run: python3 scripts/ci/check_codeql_suppressions.py

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@v3
        with:
          output: ${{ runner.temp }}/codeql-results

      - name: Require clean raw CodeQL SARIF
        run: >-
          python3 scripts/ci/assert_codeql_sarif_clean.py
          "${{ steps.analyze.outputs.sarif-output }}"
