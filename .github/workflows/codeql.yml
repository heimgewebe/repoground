name: CodeQL

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: RepoGround CodeQL policy (python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          token: ${{ github.token }}
          fetch-depth: 1
          persist-credentials: true

      - name: Validate CodeQL suppression inventory
        run: python3 scripts/ci/check_codeql_suppressions.py

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a  # v4

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          output: ${{ runner.temp }}/codeql-results

      - name: Require clean raw CodeQL SARIF
        run: >-
          python3 scripts/ci/assert_codeql_sarif_clean.py
          "${{ steps.analyze.outputs.sarif-output }}"

      - name: Emit security-alert readback summary
        if: always() && steps.analyze.outputs.sarif-output != ''
        run: >-
          python3 scripts/ci/emit_security_alert_summary.py
          --sarif-dir "${{ steps.analyze.outputs.sarif-output }}"
          --output "${{ runner.temp }}/security-alert-summary.json"

      - name: Upload security-alert readback summary
        if: always() && steps.analyze.outputs.sarif-output != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: security-alert-summary
          path: ${{ runner.temp }}/security-alert-summary.json
          if-no-files-found: error
          retention-days: 90
