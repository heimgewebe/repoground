name: task-index

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  planning-registration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Planning registration ratchet
        id: ratchet
        shell: bash
        run: |
          set -uo pipefail
          # Capture the exit code without aborting the job, so we can still
          # publish the report artifact and step summary before failing.
          code=0
          python3 -m scripts.docmeta.check_planning_registration \
            --ratchet \
            --baseline docs/tasks/planning-registration-baseline.json \
            --format json \
            > planning-registration-report.json || code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "Ratchet exit code: ${code}"

      - name: Write step summary
        if: always()
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, sys
          path = "planning-registration-report.json"
          print("## Planning Registration Ratchet\n")
          try:
              with open(path, encoding="utf-8") as fh:
                  report = json.load(fh)
          except Exception as exc:  # noqa: BLE001 - summary must never crash the job
              print(f"::warning::Planning registration report unavailable: {exc}", file=sys.stderr)
              print(f"Report unavailable: `{exc}`")
              raise SystemExit(0)
          s = report.get("summary", {})
          print(f"- mode: `{report.get('mode')}`")
          print(f"- current findings: **{s.get('current_findings', 0)}**")
          print(f"- baseline findings: **{s.get('baseline_findings', 0)}**")
          print(f"- known findings: **{s.get('known_findings', 0)}**")
          print(f"- new findings: **{s.get('new_findings', 0)}**")
          print(f"- resolved findings: **{s.get('resolved_findings', 0)}**")
          print(f"- invalid exceptions: **{s.get('invalid_exceptions', 0)}**")
          print(f"- control errors: **{s.get('control_errors', 0)}**")
          new = report.get("new_findings", [])
          inv = report.get("invalid_exceptions", [])
          ctrl = report.get("control_errors", [])
          resolved = report.get("resolved_findings", [])
          if ctrl:
              print("\n### Control-file errors (blocking, exit 2)\n")
              for f in ctrl:
                  print(f"- `{f.get('code')}` `{f.get('path')}` — {f.get('reason', '')}")
          if new:
              print("\n### New findings (blocking)\n")
              for f in new:
                  print(f"- `{f.get('code')}` `{f.get('path')}` — {f.get('reason', '')}")
          if inv:
              print("\n### Invalid exceptions (blocking)\n")
              for f in inv:
                  print(f"- `{f.get('code')}` `{f.get('path')}` — {f.get('reason', '')}")
          if resolved:
              print("\n### Resolved/stale baseline entries\n")
              for f in resolved:
                  print(f"- `{f.get('id')}` `{f.get('path')}`")
              print("\nDry-run locally before pruning:")
              print("```bash")
              print("python3 -m scripts.docmeta.check_planning_registration --prune-baseline --baseline docs/tasks/planning-registration-baseline.json --format human")
              print("```")
              print("Write is explicit and fails closed if it would remove the last remaining baseline entry.")
          if not new and not inv and not ctrl:
              print("\n_No new drift. Known drift is tolerated via the baseline._")
          PY

      - name: Upload planning registration report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: planning-registration-report
          path: planning-registration-report.json
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce ratchet result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.ratchet.outputs.exit_code }}"
          if [ -z "${code}" ]; then
            echo "ERROR: Missing ratchet exit_code output; failing closed." >&2
            exit 2
          fi
          exit "${code}"
