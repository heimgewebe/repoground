name: Apply Graph Docs Once

"on":
  push:
    branches: [feat/graph-source-roots-consumer]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'feat/graph-source-roots-consumer';
            const updates = [
              ['docs/diagnostics/graph-quality-baseline.md', '557ec83d3f977712299997b064113ab671c06532', true],
              ['docs/proofs/graph-source-roots-consumer-proof.md', '0e50ac04bf95ed346f6727579201d4fee5d34b3d', false],
            ];
            for (const [path, blobSha, exists] of updates) {
              const blob = await github.rest.git.getBlob({owner, repo, file_sha: blobSha});
              const args = {
                owner, repo, path, branch,
                message: 'docs(graph): document source root consumer',
                content: blob.data.content.replace(/\n/g, ''),
              };
              if (exists) {
                const current = await github.rest.repos.getContent({owner, repo, path, ref: branch});
                args.sha = current.data.sha;
              }
              await github.rest.repos.createOrUpdateFileContents(args);
            }
            const self = '.github/workflows/apply-graph-docs-once.yml';
            const workflow = await github.rest.repos.getContent({owner, repo, path: self, ref: branch});
            await github.rest.repos.deleteFile({
              owner, repo, path: self, branch,
              sha: workflow.data.sha,
              message: 'chore: remove completed graph docs helper',
            });
