name: Apply Graph Baseline Once

"on":
  push:
    branches: [feat/graph-source-roots-consumer]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'feat/graph-source-roots-consumer';
            const target = 'docs/diagnostics/graph-quality-baseline.v1.json';
            const current = await github.rest.repos.getContent({owner, repo, path: target, ref: branch});
            const blob = await github.rest.git.getBlob({owner, repo, file_sha: '735aea5db8a059f23ee78910e4bc9771b4378d5b'});
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: target, branch,
              sha: current.data.sha,
              message: 'docs(graph): regenerate source root quality baseline',
              content: blob.data.content.replace(/\n/g, ''),
            });
            const self = '.github/workflows/apply-graph-baseline-once.yml';
            const workflow = await github.rest.repos.getContent({owner, repo, path: self, ref: branch});
            await github.rest.repos.deleteFile({
              owner, repo, path: self, branch,
              sha: workflow.data.sha,
              message: 'chore: remove completed graph baseline helper',
            });
