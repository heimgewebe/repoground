name: Apply G4a Registration Once

"on":
  push:
    branches: [docs/register-g4a-task]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/register-g4a-task
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply and validate registration
        run: |
          python3 scripts/apply_g4a_registration.py
          python3 -m json.tool docs/tasks/index.json >/dev/null
          git diff --check
      - name: Commit generated files
        run: |
          rm scripts/apply_g4a_registration.py
          git config user.name lenskit-task-registrar
          git config user.email lenskit-task-registrar@users.noreply.github.com
          git add docs/tasks/board.md docs/tasks/index.json scripts
          git commit -m "docs(tasks): register graph resolution and layers"
          git push origin HEAD:docs/register-g4a-task
