permissions:
  contents: read

# Match the repo-wide convention in sibling workflows so any JavaScript GitHub
# Action runs on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lens-model:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Log Python version
        run: python --version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          pip install -r merger/lenskit/requirements.txt
          pip install -r requirements-dev.txt

      - name: Require jsonschema (contract tests must run, not skip)
        run: |
          python - <<'PY'
          from importlib.metadata import version
          import jsonschema
          from jsonschema import FormatChecker

          checker = FormatChecker()
          registered = getattr(checker, "checkers", {})

          print("jsonschema", version("jsonschema"))
          print("date-time format registered:", "date-time" in registered)

          if "date-time" not in registered:
              raise SystemExit(
                  "jsonschema date-time format validation is unavailable; "
                  "install jsonschema[format-nongpl]"
              )

          probes = {
              "valid_z": checker.conforms(
                  "2026-06-21T10:00:00Z",
                  "date-time",
              ),
              "invalid_literal": checker.conforms(
                  "invalid",
                  "date-time",
              ),
              "timezone_less": checker.conforms(
                  "2026-06-21T10:00:00",
                  "date-time",
              ),
          }

          print(probes)

          if probes != {
              "valid_z": True,
              "invalid_literal": False,
              "timezone_less": False,
          }:
              raise SystemExit(
                  f"unexpected date-time validation capability: {probes}"
              )
          PY

      - name: Validate lens schemas (draft-07 meta)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          for path in [
              Path("merger/lenskit/contracts/lens-facet.v1.schema.json"),
              Path("merger/lenskit/contracts/lens-card.v1.schema.json"),
              Path("merger/lenskit/contracts/pr-delta-card.v1.schema.json"),
              Path("merger/lenskit/contracts/relation-card.v1.schema.json"),
          ]:
              schema = json.loads(
                  path.read_text(encoding="utf-8")
              )
              Draft7Validator.check_schema(schema)
              print(f"{path.name}: meta-valid")
          PY

      - name: Validate source schema (draft-2020-12 meta)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          path = Path("merger/lenskit/contracts/pr-schau-delta.v1.schema.json")
          schema = json.loads(path.read_text(encoding="utf-8"))
          Draft202012Validator.check_schema(schema)
          print(f"{path.name}: meta-valid")
          PY

      - name: Validate lens path patterns in ECMAScript Unicode mode (Node)
        run: node merger/lenskit/tests/test_lens_facet_pattern_ecma.js

      - name: Run lens model tests
        run: |
          python -m pytest -q \
            merger/lenskit/tests/test_lenses.py \
            merger/lenskit/tests/test_primary_lens_audit.py \
            merger/lenskit/tests/test_lens_facets.py \
            merger/lenskit/tests/test_lens_cards.py \
            merger/lenskit/tests/test_lens_card_validate.py \
            merger/lenskit/tests/test_pr_delta_cards.py \
            merger/lenskit/tests/test_pr_delta_card_validate.py \
            merger/lenskit/tests/test_relation_cards.py \
            merger/lenskit/tests/test_relation_card_validate.py \
            merger/lenskit/tests/test_architecture_import_graph.py \
            merger/lenskit/tests/test_pr_schau_delta_schema.py \
            merger/lenskit/tests/test_agent_reading_pack.py \
            merger/lenskit/tests/test_agent_reading_pack_usage_rules.py \
            merger/lenskit/tests/test_cli_agent_pack.py \
            merger/lenskit/tests/test_bundle_manifest_integration.py::test_agent_reading_pack_emitted_schema_valid_and_hashed

      - name: Ruff (lens model core and tests)
        run: |
          ruff check \
            merger/lenskit/core/lens_facets.py \
            merger/lenskit/core/lens_cards.py \
            merger/lenskit/core/lens_card_validate.py \
            merger/lenskit/core/pr_delta_cards.py \
            merger/lenskit/core/pr_delta_card_validate.py \
            merger/lenskit/core/relation_cards.py \
            merger/lenskit/core/relation_card_validate.py \
            merger/lenskit/core/agent_reading_pack.py \
            merger/lenskit/architecture/import_graph.py \
            merger/lenskit/tests/test_lens_facets.py \
            merger/lenskit/tests/test_lens_cards.py \
            merger/lenskit/tests/test_lens_card_validate.py \
            merger/lenskit/tests/test_pr_delta_cards.py \
            merger/lenskit/tests/test_pr_delta_card_validate.py \
            merger/lenskit/tests/test_relation_cards.py \
            merger/lenskit/tests/test_relation_card_validate.py \
            merger/lenskit/tests/test_architecture_import_graph.py \
            merger/lenskit/tests/test_pr_schau_delta_schema.py \
            merger/lenskit/tests/test_agent_reading_pack.py \
            merger/lenskit/tests/test_agent_reading_pack_usage_rules.py \
            merger/lenskit/tests/test_cli_agent_pack.py \
            merger/lenskit/tests/test_bundle_manifest_integration.py
