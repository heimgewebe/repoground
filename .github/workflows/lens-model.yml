permissions:
  contents: read

# Match the repo-wide convention in sibling workflows so any JavaScript GitHub
# Action runs on Node 24.
jobs:
  validates-schema-target-proof:
    # Dedicated job: only this one needs full history for the fixed base snapshot.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Lint audit script and falsification tests
        run: |
          ruff check \
            scripts/proofs/guard_relation_validates_schema_audit.py \
            merger/repoground/tests/test_guard_relation_validates_schema_audit.py

      - name: Falsification tests (gate must reject tampered inputs)
        run: |
          python3 -m pytest -q \
            merger/repoground/tests/test_guard_relation_validates_schema_audit.py

      - name: Regenerate audit from snapshot and compare (derive, not echo)
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          BASE_SHA="05bbd0d608afa8faf581887a455d4dcf6fa15ae9"
          SCRIPT="scripts/proofs/guard_relation_validates_schema_audit.py"
          COMMITTED="docs/proofs/guard-relation-cards-v1b-validates-schema-audit.json"
          python3 "$SCRIPT" --repo "$PWD" --base-sha "$BASE_SHA" --output /tmp/vsa.json
          python3 -O "$SCRIPT" --repo "$PWD" --base-sha "$BASE_SHA" --output /tmp/vsa-opt.json
          cmp /tmp/vsa.json /tmp/vsa-opt.json
          if ! cmp /tmp/vsa.json "$COMMITTED"; then
            echo "::error::regenerated audit differs from committed derived report"
            diff <(python3 -m json.tool "$COMMITTED") <(python3 -m json.tool /tmp/vsa.json) || true
            exit 1
          fi

      - name: Negative control (a tampered manifest must fail closed)
        run: |
          set -euo pipefail
          BASE_SHA="05bbd0d608afa8faf581887a455d4dcf6fa15ae9"
          SCRIPT="scripts/proofs/guard_relation_validates_schema_audit.py"
          COMMITTED="docs/proofs/guard-relation-cards-v1b-validates-schema-audit.json"
          python3 - "$COMMITTED" > /tmp/tampered.json <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              data = json.load(handle)

          fields = data["fields"]
          line_index = fields.index("relation_call_line")
          source_index = fields.index("source_path")
          relation_owner_index = fields.index("relation_owner_symbol")
          engine_owner_index = fields.index("engine_owner_symbol")
          schema_index = fields.index("schema_path")
          matches = []
          for index, row in enumerate(data["flows"]):
              values = row.split("|")
              if len(values) != len(fields):
                  raise SystemExit(f"invalid flow width at index {index}")
              if (
                  values[source_index].endswith("/core/relation_card_validate.py")
                  and values[relation_owner_index] == "validate_relation_card"
                  and values[engine_owner_index] == "_schema_check"
                  and values[schema_index].endswith(
                      "/contracts/relation-card.v1.schema.json"
                  )
              ):
                  matches.append(index)
          if len(matches) != 1:
              raise SystemExit(
                  f"expected exactly one relation-card flow, found {len(matches)}"
              )
          row_index = matches[0]
          values = data["flows"][row_index].split("|")
          values[line_index] = str(int(values[line_index]) + 10_000)
          data["flows"][row_index] = "|".join(values)
          print(json.dumps(data))
          PY
          code=0
          output="$(
            python3 "$SCRIPT" --repo "$PWD" --base-sha "$BASE_SHA" \
              --manifest /tmp/tampered.json --output /tmp/rejected.json 2>&1
          )" || code=$?
          echo "$output"
          if [ "$code" -ne 2 ] || [[ "$output" != *"relation callsite mismatch"* ]]; then
            echo "::error::tampered relation callsite did not fail the expected gate"
            exit 1
          fi
          echo "tampered manifest correctly rejected"

  lens-model:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      - name: Log Python version
        run: python --version

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Require jsonschema (contract tests must run, not skip)
        run: |
          python - <<'PY'
          from importlib.metadata import version
          import jsonschema
          from jsonschema import FormatChecker

          checker = FormatChecker()
          registered = getattr(checker, "checkers", {})

          print("jsonschema", version("jsonschema"))
          print("date-time format registered:", "date-time" in registered)

          if "date-time" not in registered:
              raise SystemExit(
                  "jsonschema date-time format validation is unavailable; "
                  "install jsonschema[format-nongpl]"
              )

          probes = {
              "valid_z": checker.conforms(
                  "2026-06-21T10:00:00Z",
                  "date-time",
              ),
              "invalid_literal": checker.conforms(
                  "invalid",
                  "date-time",
              ),
              "timezone_less": checker.conforms(
                  "2026-06-21T10:00:00",
                  "date-time",
              ),
          }

          print(probes)

          if probes != {
              "valid_z": True,
              "invalid_literal": False,
              "timezone_less": False,
          }:
              raise SystemExit(
                  f"unexpected date-time validation capability: {probes}"
              )
          PY

      - name: Validate lens schemas (draft-07 meta)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          for path in [
              Path("merger/repoground/contracts/lens-facet.v1.schema.json"),
              Path("merger/repoground/contracts/lens-card.v1.schema.json"),
              Path("merger/repoground/contracts/pr-delta-card.v1.schema.json"),
              Path("merger/repoground/contracts/relation-card.v1.schema.json"),
          ]:
              schema = json.loads(
                  path.read_text(encoding="utf-8")
              )
              Draft7Validator.check_schema(schema)
              print(f"{path.name}: meta-valid")
          PY

      - name: Validate source schema (draft-2020-12 meta)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          path = Path("merger/repoground/contracts/pr-schau-delta.v1.schema.json")
          schema = json.loads(path.read_text(encoding="utf-8"))
          Draft202012Validator.check_schema(schema)
          print(f"{path.name}: meta-valid")
          PY

      - name: Validate lens path patterns in ECMAScript Unicode mode (Node)
        run: node merger/repoground/tests/test_lens_facet_pattern_ecma.js

      - name: Run lens model tests
        run: |
          python -m pytest -q \
            merger/repoground/tests/test_lenses.py \
            merger/repoground/tests/test_primary_lens_audit.py \
            merger/repoground/tests/test_lens_facets.py \
            merger/repoground/tests/test_lens_cards.py \
            merger/repoground/tests/test_lens_card_validate.py \
            merger/repoground/tests/test_pr_delta_cards.py \
            merger/repoground/tests/test_pr_delta_card_validate.py \
            merger/repoground/tests/test_relation_cards.py \
            merger/repoground/tests/test_relation_card_validate.py \
            merger/repoground/tests/test_architecture_import_graph.py \
            merger/repoground/tests/test_pr_schau_delta_schema.py \
            merger/repoground/tests/test_agent_reading_pack.py \
            merger/repoground/tests/test_agent_reading_pack_usage_rules.py \
            merger/repoground/tests/test_cli_agent_pack.py \
            merger/repoground/tests/test_bundle_manifest_integration.py::test_agent_reading_pack_emitted_schema_valid_and_hashed

      - name: Ruff (lens model core and tests)
        run: |
          ruff check \
            merger/repoground/core/lens_facets.py \
            merger/repoground/core/lens_cards.py \
            merger/repoground/core/lens_card_validate.py \
            merger/repoground/core/pr_delta_cards.py \
            merger/repoground/core/pr_delta_card_validate.py \
            merger/repoground/core/relation_cards.py \
            merger/repoground/core/relation_card_validate.py \
            merger/repoground/core/agent_reading_pack.py \
            merger/repoground/architecture/import_graph.py \
            merger/repoground/tests/test_lens_facets.py \
            merger/repoground/tests/test_lens_cards.py \
            merger/repoground/tests/test_lens_card_validate.py \
            merger/repoground/tests/test_pr_delta_cards.py \
            merger/repoground/tests/test_pr_delta_card_validate.py \
            merger/repoground/tests/test_relation_cards.py \
            merger/repoground/tests/test_relation_card_validate.py \
            merger/repoground/tests/test_architecture_import_graph.py \
            merger/repoground/tests/test_pr_schau_delta_schema.py \
            merger/repoground/tests/test_agent_reading_pack.py \
            merger/repoground/tests/test_agent_reading_pack_usage_rules.py \
            merger/repoground/tests/test_cli_agent_pack.py \
            merger/repoground/tests/test_bundle_manifest_integration.py
