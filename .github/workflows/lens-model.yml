      - "merger/lenskit/tests/test_bundle_manifest_integration.py"
      - "docs/architecture/lens-model.md"
      - "docs/proofs/facet-model-v1-proof.md"
      - "docs/proofs/lens-card-v1-proof.md"
      - "docs/proofs/pr-delta-cards-gap-report.md"
      - "docs/proofs/relation-cards-v1-target-proof.md"
