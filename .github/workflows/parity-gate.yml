name: Parity Gate (Content vs Diagnostic)

# Path-scoped blocking gate for parity-relevant changes in the content/diagnostic
# parity runtime (merger/repoground/core/parity_gates.py + parity_state.py + the
# `lenskit parity compare|enforce` CLI). Runs only when changes touch parity code,
# tests, contracts, or the merge pipeline. This is distinct from the
# Frontend Parity Guard (parity_check.yml), which checks frontend feature
# parity (CLI args / HTML IDs / JS payload keys), not artifact parity.

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "merger/repoground/core/parity_gates.py"
      - "merger/repoground/core/parity_state.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/core/citation_map.py"
      - "merger/repoground/core/citation_validate.py"
      - "merger/repoground/core/citation_id.py"
      - "merger/repoground/cli/cmd_parity.py"
      - "merger/repoground/cli/main.py"
      - "merger/repoground/contracts/**"
      - "merger/repoground/tests/test_parity.py"
      - "merger/repoground/tests/test_parity_state.py"
      - "merger/repoground/tests/test_cli_parity_compare.py"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/parity-gate.yml"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "merger/repoground/core/parity_gates.py"
      - "merger/repoground/core/parity_state.py"
      - "merger/repoground/core/merge.py"
      - "merger/repoground/core/citation_map.py"
      - "merger/repoground/core/citation_validate.py"
      - "merger/repoground/core/citation_id.py"
      - "merger/repoground/cli/cmd_parity.py"
      - "merger/repoground/cli/main.py"
      - "merger/repoground/contracts/**"
      - "merger/repoground/tests/test_parity.py"
      - "merger/repoground/tests/test_parity_state.py"
      - "merger/repoground/tests/test_cli_parity_compare.py"
      - "merger/repoground/requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/parity-gate.yml"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  parity-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Log Python Version
        run: python --version

      - name: Install Dependencies
        # jsonschema (runtime requirement) is mandatory: the parity gate
        # validates citation_map_jsonl against its contract schema and fails
        # closed if jsonschema is unavailable.
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Run Parity Gate Suite
        run: |
          pytest -q \
            merger/repoground/tests/test_parity.py \
            merger/repoground/tests/test_parity_state.py \
            merger/repoground/tests/test_cli_parity_compare.py
