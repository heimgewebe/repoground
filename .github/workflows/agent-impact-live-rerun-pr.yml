name: Agent Impact Live Rerun PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: agent-impact-live-rerun-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  live-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Checkout exact target revisions
        shell: bash
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          mkdir -p repos
          clone_at() {
            name="$1"
            sha="$2"
            git clone --filter=blob:none --no-checkout "https://github.com/heimgewebe/${name}.git" "repos/${name}"
            git -C "repos/${name}" checkout --detach "$sha"
          }
          clone_at lenskit 456d37bd142349bc0c04925d87934eefbbc546ac
          clone_at grabowski f6eed48752fd2cf32f070dc69b2112e2498872cb
          clone_at weltgewebe e095903bb71c937d861fa64d7e8a6b593062ca6f
          for name in lenskit grabowski weltgewebe; do
            git -C "repos/${name}" status --short
            git -C "repos/${name}" rev-parse HEAD > "${name}.commit"
          done

      - name: Install current PR runtime
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --require-hashes \
            -r requirements/repobrief-dev.lock.txt
          echo "PYTHONPATH=$PWD" >> "$GITHUB_ENV"

      - name: Create exact live bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p live-output
          for name in lenskit grabowski weltgewebe; do
            mkdir -p "live-output/${name}"
            python -m merger.lenskit.cli.main repobrief snapshot create \
              --repo "$PWD/repos/${name}" \
              --out "$PWD/live-output/${name}" \
              --profile agent-portable \
              --mode gesamt \
              --output-mode dual \
              --redact-secrets \
              > "live-output/${name}/snapshot-create.json" \
              2> "live-output/${name}/snapshot-create.stderr"
            printf '0\n' > "live-output/${name}/snapshot-create.exit"
          done

      - name: Run fixed live calibration and assertions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import platform
          import time
          from pathlib import Path

          from merger.lenskit.core.agent_impact_eval import evaluate_agent_impact_goldset
          from merger.lenskit.core.agent_impact_refinement import is_repository_relative_path
          from merger.lenskit.core.repobrief_agent_impact_adapter import RepoBriefAgentImpactAdapter

          output = Path.cwd() / "live-output"
          commits = {
              "lenskit": "456d37bd142349bc0c04925d87934eefbbc546ac",
              "grabowski": "f6eed48752fd2cf32f070dc69b2112e2498872cb",
              "weltgewebe": "e095903bb71c937d861fa64d7e8a6b593062ca6f",
          }
          cases = [
              {
                  "id": "lenskit-agent-impact-related-test",
                  "repository": "lenskit",
                  "target_path": "merger/lenskit/core/agent_impact_context.py",
                  "expected_paths": ["merger/lenskit/tests/test_agent_impact_context.py"],
              },
              {
                  "id": "grabowski-job-finalizer-related-test",
                  "repository": "grabowski",
                  "target_path": "src/grabowski_job_finalizer.py",
                  "expected_paths": ["tests/test_job_finalizer.py"],
              },
              {
                  "id": "weltgewebe-review-impact-related-test",
                  "repository": "weltgewebe",
                  "target_path": "scripts/docmeta/review_impact.py",
                  "expected_paths": ["scripts/docmeta/tests/test_review_impact.py"],
              },
          ]
          goldset = {
              "kind": "repobrief.agent_impact_goldset",
              "version": "1.0",
              "id": "repobrief-agent-impact-live-bundles-2026-07-13-rerun",
              "measurement_scope": "live_bundle_fixed_revision_rerun",
              "minimum_target_recall_advantage": 0.2,
              "minimum_context_path_reduction_at_equal_or_better_recall": 0.2,
              "cases": [
                  {
                      "id": item["id"],
                      "target": {"path": item["target_path"], "mode": "edit"},
                      "expected_paths": item["expected_paths"],
                  }
                  for item in cases
              ],
              "does_not_establish": [
                  "answer_correctness",
                  "complete_call_graph",
                  "complete_blast_radius",
                  "runtime_dependency",
                  "test_sufficiency",
                  "review_completeness",
                  "merge_readiness",
                  "default_promotion",
              ],
          }

          manifests = {}
          snapshots = []
          for name in commits:
              found = sorted((output / name).rglob("*.bundle.manifest.json"))
              if len(found) != 1:
                  raise SystemExit(f"{name}: expected exactly one manifest, got {len(found)}")
              manifest_path = found[0]
              manifests[name] = manifest_path
              snapshots.append({"id": name, "manifest": str(manifest_path)})

          config_path = output / "adapter-config.json"
          config_path.write_text(
              json.dumps(
                  {
                      "kind": "repobrief.readonly_adapter_config",
                      "version": "1.0",
                      "allowed_roots": [str(output)],
                      "snapshots": snapshots,
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
          )
          adapter = RepoBriefAgentImpactAdapter.from_config(config_path)

          def collect_relative_paths(value):
              paths = []
              if isinstance(value, dict):
                  for key, item in value.items():
                      if key == "path" and is_repository_relative_path(item):
                          paths.append(str(item).strip())
                      else:
                          paths.extend(collect_relative_paths(item))
              elif isinstance(value, list):
                  for item in value:
                      paths.extend(collect_relative_paths(item))
              return list(dict.fromkeys(paths))

          observations = {}
          runtime_cases = {}
          repository_evidence = {}
          for name, manifest_path in manifests.items():
              repository_evidence[name] = {
                  "repository": f"heimgewebe/{name}",
                  "commit": commits[name],
                  "snapshot_id": name,
                  "manifest_sha256": hashlib.sha256(manifest_path.read_bytes()).hexdigest(),
              }

          for case in cases:
              case_id = case["id"]
              name = case["repository"]
              target_path = case["target_path"]

              started = time.perf_counter_ns()
              baseline = adapter.query_existing_index(
                  name,
                  target_path,
                  k=30,
                  resolve_evidence=True,
                  project_sources=True,
              )
              baseline_ms = (time.perf_counter_ns() - started) / 1_000_000
              baseline_paths = collect_relative_paths(baseline)

              started = time.perf_counter_ns()
              impact = adapter.agent_impact_context(
                  name,
                  target_path=target_path,
                  mode="edit",
                  max_items=30,
                  include_query_context=True,
              )
              impact_ms = (time.perf_counter_ns() - started) / 1_000_000
              repeated = adapter.agent_impact_context(
                  name,
                  target_path=target_path,
                  mode="edit",
                  max_items=30,
                  include_query_context=True,
              )
              deterministic_equal = impact == repeated
              provenance = impact.get("provenance") or {}
              if impact.get("status") not in {"available", "partial"}:
                  raise SystemExit(f"{case_id}: unusable impact status {impact.get('status')}")
              if provenance.get("status") != "coherent":
                  raise SystemExit(f"{case_id}: incoherent provenance {provenance}")
              if not deterministic_equal:
                  raise SystemExit(f"{case_id}: impact context is not deterministic")

              observations[case_id] = {
                  "baseline_paths": baseline_paths,
                  "impact_context": impact,
              }
              runtime_cases[case_id] = {
                  "repository": f"heimgewebe/{name}",
                  "commit": commits[name],
                  "snapshot_id": name,
                  "target_path": target_path,
                  "query": target_path,
                  "expected_paths": case["expected_paths"],
                  "baseline_status": baseline.get("status"),
                  "impact_status": impact.get("status"),
                  "baseline_latency_ms": baseline_ms,
                  "impact_latency_ms": impact_ms,
                  "deterministic_equal": deterministic_equal,
                  "run_id": provenance.get("run_id"),
                  "canonical_dump_index_sha256": provenance.get("canonical_dump_index_sha256"),
                  "source_statuses": impact.get("source_statuses"),
                  "gaps": impact.get("gaps"),
                  "resolved_query_paths": [
                      item.get("path")
                      for item in impact.get("related_tests", [])
                      if item.get("evidence_type") == "resolved_query"
                  ],
              }

          report = evaluate_agent_impact_goldset(goldset, observations)
          report.update(
              {
                  "measurement_scope": "live_bundle_fixed_revision_rerun",
                  "measured_at": "2026-07-13",
                  "runtime_head": os.environ.get("GITHUB_SHA"),
                  "repositories": repository_evidence,
                  "case_runtime": runtime_cases,
                  "environment": {
                      "python": platform.python_version(),
                      "platform": platform.platform(),
                      "runner_os": os.environ.get("RUNNER_OS"),
                      "runtime_lenskit_head": os.environ.get("GITHUB_SHA"),
                  },
                  "promotion": {
                      "default_promoted": False,
                      "separate_decision_required": True,
                      "recommendation": (
                          "retain_opt_in_pending_human_review"
                          if report["decision"]["navigation_utility_established_for_goldset"]
                          else "do_not_promote_refine_or_remove"
                      ),
                  },
              }
          )

          case_by_id = {item["id"]: item for item in report["cases"]}
          grabowski_case = case_by_id["grabowski-job-finalizer-related-test"]
          grabowski_runtime = runtime_cases["grabowski-job-finalizer-related-test"]
          assert report["metrics"]["baseline_target_recall"] == 1.0
          assert report["metrics"]["impact_target_recall"] == 1.0
          assert report["metrics"]["no_case_regression"] is True
          assert report["decision"]["navigation_utility_established_for_goldset"] is True
          assert report["decision"]["default_promoted"] is False
          assert report["promotion"]["default_promoted"] is False
          assert grabowski_case["impact_recall"] == 1.0
          assert "tests/test_job_finalizer.py" in grabowski_case["impact_paths"]
          assert "tests/test_job_finalizer.py" in grabowski_runtime["resolved_query_paths"]

          (output / "live-goldset.json").write_text(
              json.dumps(goldset, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          (output / "live-observations.json").write_text(
              json.dumps(observations, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          (output / "live-evaluation.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Prove target repositories remained clean
        shell: bash
        run: |
          set -euo pipefail
          for name in lenskit grabowski weltgewebe; do
            dirty="$(git -C "repos/${name}" status --porcelain)"
            printf '%s' "$dirty" > "live-output/${name}/source-dirty-state.txt"
            test -z "$dirty"
          done

      - name: Write evidence digests
        shell: bash
        run: |
          set -euo pipefail
          sha256sum \
            live-output/live-goldset.json \
            live-output/live-observations.json \
            live-output/live-evaluation.json \
            > live-output/evidence.sha256

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: agent-impact-live-rerun-${{ github.sha }}
          path: |
            live-output/live-goldset.json
            live-output/live-observations.json
            live-output/live-evaluation.json
            live-output/evidence.sha256
            live-output/adapter-config.json
            live-output/*/snapshot-create.json
            live-output/*/snapshot-create.stderr
            live-output/*/snapshot-create.exit
            live-output/*/source-dirty-state.txt
            live-output/*/*.bundle.manifest.json
            lenskit.commit
            grabowski.commit
            weltgewebe.commit
          if-no-files-found: error
          retention-days: 30
