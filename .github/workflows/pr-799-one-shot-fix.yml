---
name: PR 799 one-shot string fix

"on":
  push:
    branches:
      - docs/guard-relation-validates-schema-v1b-target-proof
    paths:
      - .github/workflows/pr-799-one-shot-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/guard-relation-validates-schema-v1b-target-proof
          fetch-depth: 0

      - name: Replace adjacent literals with one explicit literal
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/proofs/guard_relation_validates_schema_audit.py")
          old = (
              '            "Validators reached only through a project-local loader "\n'
              '            "(_load_jsonschema / importlib.import_module) are manual_source_review, not derived_ast.",\n'
          )
          new = (
              '            "Validators reached only through a project-local loader '
              '(_load_jsonschema / importlib.import_module) are manual_source_review, not derived_ast.",\n'
          )
          text = path.read_text(encoding="utf-8")
          if text.count(old) != 1:
              raise SystemExit(f"expected exactly one target occurrence, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

          python3 -m py_compile scripts/proofs/guard_relation_validates_schema_audit.py
          git diff --check

      - name: Commit and push the minimal fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/proofs/guard_relation_validates_schema_audit.py
          git commit -m "fix(proof): avoid implicit string concatenation"
          git push origin HEAD:docs/guard-relation-validates-schema-v1b-target-proof
