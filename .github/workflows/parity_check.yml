name: Frontend Parity Guard

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "merger/repoground/service/models.py"
      - "merger/repoground/frontends/pythonista/build.py"
      - "merger/repoground/frontends/webui/index.html"
      - "merger/repoground/frontends/webui/app.js"
      - "tools/parity_guard.py"
      - "tests/test_parity_guard.py"
      - "docs/PARITY_GUARD.md"
      - "AGENTS.md"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "merger/repoground/service/models.py"
      - "merger/repoground/frontends/pythonista/build.py"
      - "merger/repoground/frontends/webui/index.html"
      - "merger/repoground/frontends/webui/app.js"
      - "tools/parity_guard.py"
      - "tests/test_parity_guard.py"
      - "docs/PARITY_GUARD.md"
      - "AGENTS.md"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  parity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Log Python Version
        run: python --version

      - name: Install Test Dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Verify Guard Logic (Self-Test)
        run: pytest tests/test_parity_guard.py

      - name: Run Parity Guard
        run: python3 tools/parity_guard.py
