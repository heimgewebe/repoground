name: Frontend Parity Guard

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "merger/lenskit/service/models.py"
      - "merger/lenskit/frontends/pythonista/repolens.py"
      - "merger/lenskit/frontends/webui/index.html"
      - "merger/lenskit/frontends/webui/app.js"
      - "tools/parity_guard.py"
      - "tests/test_parity_guard.py"
      - "docs/PARITY_GUARD.md"
      - "AGENTS.md"
      - "requirements/repobrief-dev.lock.txt"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "merger/lenskit/service/models.py"
      - "merger/lenskit/frontends/pythonista/repolens.py"
      - "merger/lenskit/frontends/webui/index.html"
      - "merger/lenskit/frontends/webui/app.js"
      - "tools/parity_guard.py"
      - "tests/test_parity_guard.py"
      - "docs/PARITY_GUARD.md"
      - "AGENTS.md"

      - "requirements/repobrief-dev.lock.txt"
permissions:
  contents: read

jobs:
  parity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      - name: Log Python Version
        run: python --version

      - name: Install Test Dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-dev.lock.txt

      - name: Verify Guard Logic (Self-Test)
        run: pytest tests/test_parity_guard.py

      - name: Run Parity Guard
        run: python3 tools/parity_guard.py
