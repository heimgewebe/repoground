name: Frontend Parity Guard

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "merger/lenskit/service/models.py"
      - "merger/lenskit/frontends/pythonista/repolens.py"
      - "merger/lenskit/frontends/webui/index.html"
      - "merger/lenskit/frontends/webui/app.js"
      - "tools/parity_guard.py"
      - "tests/test_parity_guard.py"
      - "docs/PARITY_GUARD.md"
      - "AGENTS.md"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "merger/lenskit/service/models.py"
      - "merger/lenskit/frontends/pythonista/repolens.py"
      - "merger/lenskit/frontends/webui/index.html"
      - "merger/lenskit/frontends/webui/app.js"
      - "tools/parity_guard.py"
      - "tests/test_parity_guard.py"
      - "docs/PARITY_GUARD.md"
      - "AGENTS.md"

permissions:
  contents: read

jobs:
  parity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      - name: Log Python Version
        run: python --version

      - name: Install Test Dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify Guard Logic (Self-Test)
        run: pytest tests/test_parity_guard.py

      - name: Run Parity Guard
        run: python3 tools/parity_guard.py
