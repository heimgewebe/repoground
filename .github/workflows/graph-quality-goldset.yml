---
name: Graph Quality Goldset

"on":
  push:
    branches: ["main", "master"]
    paths:
      - "docs/retrieval/graph_quality_goldset.v1.json"
      - "docs/diagnostics/graph-quality-baseline.v1.json"
      - "docs/diagnostics/graph-quality-baseline.md"
      - "merger/lenskit/architecture/graph_quality_eval.py"
      - "merger/lenskit/architecture/import_graph.py"
      - "merger/lenskit/tests/fixtures/graph_quality_goldset/**"
      - "merger/lenskit/tests/test_graph_quality_goldset.py"
      - ".github/workflows/graph-quality-goldset.yml"
      - "requirements/repobrief-dev.lock.txt"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "docs/retrieval/graph_quality_goldset.v1.json"
      - "docs/diagnostics/graph-quality-baseline.v1.json"
      - "docs/diagnostics/graph-quality-baseline.md"
      - "merger/lenskit/architecture/graph_quality_eval.py"
      - "merger/lenskit/architecture/import_graph.py"
      - "merger/lenskit/tests/fixtures/graph_quality_goldset/**"
      - "merger/lenskit/tests/test_graph_quality_goldset.py"
      - ".github/workflows/graph-quality-goldset.yml"

      - "requirements/repobrief-dev.lock.txt"
permissions:
  contents: read

jobs:
  graph-quality-goldset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repobrief-dev.lock.txt

      - name: Validate JSON surfaces
        run: |
          python3 -m json.tool docs/retrieval/graph_quality_goldset.v1.json >/dev/null
          python3 -m json.tool docs/diagnostics/graph-quality-baseline.v1.json >/dev/null

      - name: Run graph quality tests
        run: |
          set -o pipefail
          python -m pytest -q \
            merger/lenskit/tests/test_graph_quality_goldset.py \
            merger/lenskit/tests/test_architecture_import_graph.py \
            2>&1 | tee graph-quality-goldset-tests.log

      - name: Upload failing diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: graph-quality-goldset-diagnostics
          path: graph-quality-goldset-tests.log
          if-no-files-found: warn
          retention-days: 1

      - name: Ruff
        run: |
          ruff check \
            merger/lenskit/architecture/graph_quality_eval.py \
            merger/lenskit/tests/test_graph_quality_goldset.py

      - name: Structural checks
        run: git diff --check
