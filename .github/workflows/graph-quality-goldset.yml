---
name: Graph Quality Goldset

"on":
  push:
    branches: ["main", "master"]
    paths:
      - "docs/retrieval/graph_quality_goldset.v1.json"
      - "docs/diagnostics/graph-quality-baseline.v1.json"
      - "docs/diagnostics/graph-quality-baseline.md"
      - "merger/repoground/architecture/graph_quality_eval.py"
      - "merger/repoground/architecture/import_graph.py"
      - "merger/repoground/tests/fixtures/graph_quality_goldset/**"
      - "merger/repoground/tests/test_graph_quality_goldset.py"
      - ".github/workflows/graph-quality-goldset.yml"
      - "requirements/repoground-dev.lock.txt"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "docs/retrieval/graph_quality_goldset.v1.json"
      - "docs/diagnostics/graph-quality-baseline.v1.json"
      - "docs/diagnostics/graph-quality-baseline.md"
      - "merger/repoground/architecture/graph_quality_eval.py"
      - "merger/repoground/architecture/import_graph.py"
      - "merger/repoground/tests/fixtures/graph_quality_goldset/**"
      - "merger/repoground/tests/test_graph_quality_goldset.py"
      - ".github/workflows/graph-quality-goldset.yml"

      - "requirements/repoground-dev.lock.txt"
permissions:
  contents: read

jobs:
  graph-quality-goldset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/repoground-dev.lock.txt

      - name: Validate JSON surfaces
        run: |
          python3 -m json.tool docs/retrieval/graph_quality_goldset.v1.json >/dev/null
          python3 -m json.tool docs/diagnostics/graph-quality-baseline.v1.json >/dev/null

      - name: Run graph quality tests
        run: |
          set -o pipefail
          python -m pytest -q \
            merger/repoground/tests/test_graph_quality_goldset.py \
            merger/repoground/tests/test_architecture_import_graph.py \
            2>&1 | tee graph-quality-goldset-tests.log

      - name: Upload failing diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: graph-quality-goldset-diagnostics
          path: graph-quality-goldset-tests.log
          if-no-files-found: warn
          retention-days: 1

      - name: Ruff
        run: |
          ruff check \
            merger/repoground/architecture/graph_quality_eval.py \
            merger/repoground/tests/test_graph_quality_goldset.py

      - name: Structural checks
        run: git diff --check
