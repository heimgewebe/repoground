---
ai_context_version: 1.1

project:
  name: repoground
  summary: RepoGround Knowledge Compiler & Evidence Runtime – erzeugt strukturierte, zitierbare Repository-Bundles für LLM-Agents.
  role: merger_scanner_epistemic_core
  primary_language: python
  visibility: internal

heimgewebe:
  axis: [Motorik]
  fleet:
    enabled: true
  wgx:
    profile_expected: true
    guard_smoke_expected: false

interfaces:
  consumes: ["local repository working copies", "RepoGround HTTP API requests"]
  produces: ["canonical_md bundles", "chunk/dump/sqlite indexes", "bundle manifests & health reports"]

boundaries:
  not_responsible_for:
    - "Cross-Repo-Föderation als abgeschlossene Wahrheitsschicht (partial/minimal, siehe docs/architecture/inconsistencies.md)."
    - "Review-/Truth-Verdicts: Artefakte sind Navigation/Diagnose, canonical_md bleibt die einzige Wahrheitsquelle."

dependencies:
  internal: []
  external:
    - name: python
      version: ">=3.11"
    - name: fastapi
    - name: pydantic
    - name: jsonschema

architecture:
  entrypoints:
    - merger/repoground/frontends/pythonista/build.py
    - merger/repoground/cli/main.py
    - merger/repoground/service/app.py
  key_paths:
    - path: merger/repoground/core/merge.py
      purpose: Merge-Pipeline (scan → chunk → emit)
    - path: merger/repoground/contracts/
      purpose: JSON-Schema-Contracts der Artefakte
    - path: docs/tasks/board.md
      purpose: Task-Board (Status + Evidence)
  data_flow:
    input: Repository-Arbeitskopien (Hub) & Job-Requests
    processing: scan → chunk → emit (Markdown + JSON-Sidecars) + Health-/Surface-Validierung
    output: merges/*-Bundles (canonical_md, Indexe, Manifeste, Reports)

conventions:
  branching: "main, feature/*"
  commit_prefix: "repoground"
  ci_platform: github_actions

documentation:
  runbook: docs/GETTING_STARTED.md

ai_guidance:
  do:
    - Diagnose-first – erst Target-Proof, dann ändern (siehe CONTRIBUTING.md)
    - Frontend-Parität wahren (tools/parity_guard.py nach JobRequest-Änderungen)
  dont:
    - Diagnose-/Navigationsartefakte als Wahrheitsschicht behandeln (canonical_md bleibt Truth)
    - Pfade/Begriffe erfinden – Rollennamen folgen bundle-manifest.v1.schema.json
